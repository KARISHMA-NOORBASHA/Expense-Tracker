<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Expense Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="dashboard-header">
            <div class="header-content">
                <h1>💰 Expense Tracker</h1>
                <div class="user-info">
                    <span id="userWelcome">Welcome, User!</span>
                    <button id="logoutBtn" class="btn btn-outline">Logout</button>
                </div>
            </div>
        </header>
        
        <main class="dashboard-main">
            <!-- Add Expense Form -->
            <section class="add-expense-section">
                <h2>Add New Expense</h2>
                <form id="expenseForm" class="expense-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="item">Item Name</label>
                            <input type="text" id="item" name="item" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="cost">Cost ($)</label>
                            <input type="number" id="cost" name="cost" step="0.01" min="0" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="date">Date</label>
                            <input type="date" id="date" name="date">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Add Expense</button>
                </form>
            </section>
            
            <!-- Expenses List -->
            <section class="expenses-section">
                <div class="section-header">
                    <h2>Your Expenses</h2>
                    <div class="total-expenses">
                        Total: $<span id="totalAmount">0.00</span>
                    </div>
                </div>
                
                <div id="expensesList" class="expenses-list">
                    <!-- Expenses will be loaded here -->
                </div>
                
                <div id="loadingMessage" class="loading">Loading expenses...</div>
                <div id="emptyMessage" class="empty-state" style="display: none;">
                    No expenses yet. Start by adding your first expense above!
                </div>
            </section>
        </main>
    </div>
    
    <script>
        // Check authentication
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        
        if (!token) {
            window.location.href = 'login.html';
        }
        
        // Set user welcome message
        document.getElementById('userWelcome').textContent = `Welcome, ${user.username || 'User'}!`;
        
        // Logout functionality
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        });
        
        // Load expenses on page load
        document.addEventListener('DOMContentLoaded', loadExpenses);
        
        // Add expense form handler
        document.getElementById('expenseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const item = document.getElementById('item').value;
            const cost = parseFloat(document.getElementById('cost').value);
            const date = document.getElementById('date').value || new Date().toISOString().split('T')[0];
            
            try {
                const response = await fetch('http://localhost:5000/api/expenses', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ item, cost, date }),
                });
                
                if (response.ok) {
                    document.getElementById('expenseForm').reset();
                    loadExpenses();
                } else {
                    alert('Failed to add expense');
                }
            } catch (error) {
                alert('Network error. Please try again.');
            }
        });
        
        // Load expenses function
        async function loadExpenses() {
            const expensesList = document.getElementById('expensesList');
            const loadingMessage = document.getElementById('loadingMessage');
            const emptyMessage = document.getElementById('emptyMessage');
            const totalAmount = document.getElementById('totalAmount');
            
            try {
                const response = await fetch('http://localhost:5000/api/expenses', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (response.ok) {
                    const expenses = await response.json();
                    
                    loadingMessage.style.display = 'none';
                    
                    if (expenses.length === 0) {
                        emptyMessage.style.display = 'block';
                        expensesList.innerHTML = '';
                    } else {
                        emptyMessage.style.display = 'none';
                        renderExpenses(expenses);
                    }
                    
                    // Calculate total
                    const total = expenses.reduce((sum, expense) => sum + expense.cost, 0);
                    totalAmount.textContent = total.toFixed(2);
                }
            } catch (error) {
                loadingMessage.textContent = 'Error loading expenses';
            }
        }
        
        // Render expenses list
        function renderExpenses(expenses) {
            const expensesList = document.getElementById('expensesList');
            
            expensesList.innerHTML = expenses.map(expense => `
                <div class="expense-item" data-id="${expense._id}">
                    <div class="expense-info">
                        <div class="expense-item-name">${expense.item}</div>
                        <div class="expense-date">${new Date(expense.date).toLocaleDateString()}</div>
                    </div>
                    <div class="expense-actions">
                        <span class="expense-cost">$${expense.cost.toFixed(2)}</span>
                        <button class="btn-delete" onclick="deleteExpense('${expense._id}')">🗑️</button>
                    </div>
                </div>
            `).join('');
        }
        
        // Delete expense function
        async function deleteExpense(expenseId) {
            if (!confirm('Are you sure you want to delete this expense?')) {
                return;
            }
            
            try {
                const response = await fetch(`http://localhost:5000/api/expenses/${expenseId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (response.ok) {
                    loadExpenses();
                } else {
                    alert('Failed to delete expense');
                }
            } catch (error) {
                alert('Network error. Please try again.');
            }
        }
    </script>
</body>
</html>
